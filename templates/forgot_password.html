<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — CyberQ Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d0d; color: #e8e8e8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.card { background: #161616; border: 1px solid #2a2a2a; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
.logo { text-align: center; font-size: 22px; font-weight: 900; color: #FF6B1A; margin-bottom: 24px; }
h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; text-align: center; }
.sub { text-align: center; font-size: 14px; color: #666; margin-bottom: 28px; }
label { font-size: 13px; color: #888; display: block; margin-bottom: 6px; }
input { width: 100%; padding: 12px 14px; background: #0d0d0d; border: 1.5px solid #2a2a2a; border-radius: 8px; color: #e8e8e8; font-size: 15px; outline: none; margin-bottom: 16px; transition: border-color 0.2s; }
input:focus { border-color: #FF6B1A; }
.btn { width: 100%; padding: 14px; background: #FF6B1A; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.btn:hover { background: #e55a0a; }
.success { background: #0d2010; border: 1px solid #166534; border-radius: 8px; padding: 14px; font-size: 14px; color: #86efac; text-align: center; line-height: 1.6; }
.back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #555; text-decoration: none; }
.back:hover { color: #888; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔥 CyberQ Dashboard</div>
  <h2>Forgot Password</h2>
  <p class="sub">Enter your email and we'll send you a reset link.</p>

  {% if sent %}
  <div class="success">
    If that email exists in our system, a reset link has been sent.<br>Check your inbox.
  </div>
  {% else %}
  <form method="POST">
    <label>Email Address</label>
    <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
    <button type="submit" class="btn">Send Reset Link →</button>
  </form>
  {% endif %}
</div>
<a href="/login" class="back">← Back to sign in</a>
</body>
</html>
